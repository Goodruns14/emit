repo:
  paths: ["./"]
  sdk: segment

output:
  file: ../../master-catalog.yml

llm:
  provider: claude-code
  model: claude-sonnet-4-6
  max_tokens: 1000

manual_events:
  - booking_confirmed

destinations:
  - type: bigquery
    project_id: project-2d72861e-5770-4bc3-842
    dataset: emit_stress_wide
    location: US
    schema_type: multi_event
    multi_event_table: events
    event_column: event_name
    # Wide layout — no properties_column (each property has its own column)
    cdp_preset: none
    events:
      - purchase_completed
      - user_signed_up
      - button_click
      - page_view
