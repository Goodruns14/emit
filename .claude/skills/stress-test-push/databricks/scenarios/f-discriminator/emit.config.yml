repo:
  paths: ["./"]
  sdk: custom

output:
  file: ../../master-catalog.yml

llm:
  provider: claude-code
  model: claude-sonnet-4-6
  max_tokens: 1000

manual_events:
  - button_click

discriminator_properties:
  button_click:
    property: button_id
    values:
      - signup_cta
      - add_to_cart
      - dismiss_modal

destinations:
  - type: databricks
    host: dbc-42a57238-a4b0.cloud.databricks.com
    http_path: /sql/1.0/warehouses/3a43f4bc8208f32f
    token: ${DATABRICKS_TOKEN}
    catalog: emit_stress_test
    schema: cdp
    schema_type: per_event
    cdp_preset: none
    # Default behavior: sub-events roll up into parent `button_click`
    # before reaching the adapter. Only the parent table should get comments.
    events:
      - button_click
      - button_click.signup_cta
      - button_click.add_to_cart
      - button_click.dismiss_modal
