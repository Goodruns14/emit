repo:
  paths: ["./"]
  sdk: segment

output:
  # Runtime copy — run-lifecycle.mjs seeds this from ../../master-catalog.yml
  # at the start of each run, then mutates it to test overwrite/revert.
  file: .emit/catalog.yml

llm:
  provider: claude-code
  model: claude-sonnet-4-6
  max_tokens: 1000

manual_events:
  - purchase_completed

destinations:
  - type: databricks
    host: dbc-42a57238-a4b0.cloud.databricks.com
    http_path: /sql/1.0/warehouses/3a43f4bc8208f32f
    token: ${DATABRICKS_TOKEN}
    catalog: emit_stress_test
    schema: custom
    schema_type: per_event
    cdp_preset: none
    event_table_mapping:
      purchase_completed: evt_purchase_completed
    events:
      - purchase_completed
