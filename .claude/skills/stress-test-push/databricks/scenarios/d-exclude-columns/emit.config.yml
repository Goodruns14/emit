repo:
  paths: ["./"]
  sdk: custom

output:
  file: ../../master-catalog.yml

llm:
  provider: claude-code
  model: claude-sonnet-4-6
  max_tokens: 1000

manual_events:
  - page_view

destinations:
  - type: databricks
    host: dbc-42a57238-a4b0.cloud.databricks.com
    http_path: /sql/1.0/warehouses/3a43f4bc8208f32f
    token: ${DATABRICKS_TOKEN}
    catalog: emit_stress_test
    schema: cdp
    schema_type: per_event
    cdp_preset: none
    # Bespoke ETL auto-columns — not covered by any preset, so we list them explicitly.
    exclude_columns:
      - _fivetran_synced
      - _dbt_loaded_at
    events:
      - page_view
