repo:
  paths: ["./"]
  sdk: segment

output:
  file: ../../master-catalog.yml

llm:
  provider: claude-code
  model: claude-sonnet-4-6
  max_tokens: 1000

manual_events:
  - booking_confirmed

destinations:
  - type: bigquery
    project_id: project-2d72861e-5770-4bc3-842
    dataset: emit_stress_custom
    location: US
    schema_type: per_event
    cdp_preset: none
    # Explicit overrides: catalog event name → non-default BQ table
    event_table_mapping:
      purchase_completed: evt_purchase_completed
      user_signed_up: user_signup_v2
      page_view: page_views_v3
    events:
      - purchase_completed
      - user_signed_up
      - page_view
