name: "Emit Catalog Check"
description: "Run emit scan on PRs and post catalog diff as a comment"
branding:
  icon: "bar-chart-2"
  color: "purple"

inputs:
  anthropic_api_key:
    description: "Anthropic API key for LLM extraction"
    required: true
  base_branch:
    description: "Branch to compare against"
    required: false
    default: "main"
  auto_commit:
    description: "Auto-commit updated catalog to the PR branch (requires contents: write permission, same-repo PRs only)"
    required: false
    default: "false"
  auto_push:
    description: "Run emit push on push-to-main events (requires destination credentials)"
    required: false
    default: "false"
  snowflake_account:
    description: "Snowflake account identifier (for auto_push with Snowflake destination)"
    required: false
  snowflake_username:
    description: "Snowflake username (for auto_push with Snowflake destination)"
    required: false
  snowflake_password:
    description: "Snowflake password (for auto_push with Snowflake destination)"
    required: false
  snowflake_database:
    description: "Snowflake database (for auto_push with Snowflake destination)"
    required: false
  snowflake_schema:
    description: "Snowflake schema (for auto_push with Snowflake destination)"
    required: false

runs:
  using: "composite"
  steps:
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: "20"

    - name: Install and build CLI
      shell: bash
      run: |
        cd ${{ github.action_path }}/..
        npm ci
        npm run build

    - name: Build action
      shell: bash
      run: |
        cd ${{ github.action_path }}
        npx tsc -p tsconfig.json

    - name: Fetch base branch
      shell: bash
      run: git fetch origin ${{ inputs.base_branch }} --depth=1

    - name: Run emit catalog check
      shell: bash
      env:
        ANTHROPIC_API_KEY: ${{ inputs.anthropic_api_key }}
        EMIT_BASE_BRANCH: ${{ inputs.base_branch }}
        EMIT_AUTO_COMMIT: ${{ inputs.auto_commit }}
        EMIT_AUTO_PUSH: ${{ inputs.auto_push }}
        SNOWFLAKE_ACCOUNT: ${{ inputs.snowflake_account }}
        SNOWFLAKE_USERNAME: ${{ inputs.snowflake_username }}
        SNOWFLAKE_PASSWORD: ${{ inputs.snowflake_password }}
        SNOWFLAKE_DATABASE: ${{ inputs.snowflake_database }}
        SNOWFLAKE_SCHEMA: ${{ inputs.snowflake_schema }}
        GITHUB_TOKEN: ${{ github.token }}
      run: node ${{ github.action_path }}/dist/index.js
