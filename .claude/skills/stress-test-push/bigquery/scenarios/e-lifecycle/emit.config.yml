repo:
  paths: ["./"]
  sdk: segment

output:
  # Runtime copy. `run-lifecycle.mjs` seeds this from ../../master-catalog.yml
  # at the start of each run, then mutates it across E1-E6 to test overwrite
  # + revert + idempotence.
  file: .emit/catalog.yml

llm:
  provider: claude-code
  model: claude-sonnet-4-6
  max_tokens: 1000

manual_events:
  - purchase_completed

destinations:
  - type: bigquery
    project_id: project-2d72861e-5770-4bc3-842
    dataset: emit_stress_custom
    location: US
    schema_type: per_event
    cdp_preset: none
    event_table_mapping:
      purchase_completed: evt_purchase_completed
    events:
      - purchase_completed
